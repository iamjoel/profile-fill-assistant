<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>扫描入口页原型</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f2f0eb;
        --text: rgba(20, 26, 24, 0.9);
        --muted: rgba(20, 26, 24, 0.64);
        --line: rgba(30, 57, 50, 0.16);
        --brand: #006241;
        --brand-accent: #00754a;
        --brand-deep: #1e3932;
        --warn: #9b5b17;
        --warn-bg: #faf1df;
        --danger: #a63b2c;
        --danger-bg: #f7e8e2;
        --ok: #2d6a4f;
        --shadow-soft: 0 1px 1px rgba(0, 0, 0, 0.08), 0 18px 40px rgba(30, 57, 50, 0.08);
        --shadow-lift: 0 1px 1px rgba(0, 0, 0, 0.1), 0 26px 56px rgba(30, 57, 50, 0.14);
        --radius-lg: 28px;
        --max: 1320px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top left, rgba(203, 162, 88, 0.16), transparent 24%),
          linear-gradient(180deg, #f7f4ee 0%, var(--bg) 44%, #ede9e1 100%);
        color: var(--text);
        font-family: "Avenir Next", "Helvetica Neue", Helvetica, Arial, sans-serif;
      }

      body {
        line-height: 1.5;
        letter-spacing: -0.01em;
      }

      button {
        font: inherit;
      }

      .shell {
        width: min(calc(100% - 32px), var(--max));
        margin: 24px auto 64px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
        padding: 14px 18px;
        border: 1px solid rgba(255, 255, 255, 0.45);
        border-radius: 999px;
        background: rgba(255, 253, 249, 0.7);
        box-shadow: var(--shadow-soft);
        backdrop-filter: blur(14px);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand-mark {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        color: #fff;
        font-weight: 700;
        background:
          radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.18), transparent 28%),
          var(--brand-accent);
        box-shadow: 0 10px 20px rgba(0, 117, 74, 0.24);
      }

      .brand-copy strong,
      .hero-copy h1,
      .section-title,
      .task-title {
        font-family: Georgia, "Times New Roman", serif;
        letter-spacing: -0.03em;
      }

      .brand-copy strong {
        display: block;
        font-size: 1.02rem;
      }

      .brand-copy span,
      .eyebrow,
      .helper,
      .task-meta,
      .footer-note {
        color: var(--muted);
        font-size: 0.93rem;
      }

      .chip,
      .icon-button {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.7);
        color: var(--brand-deep);
        border-radius: 999px;
        min-height: 42px;
        padding: 8px 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 0.92rem;
      }

      .icon-button {
        width: 42px;
        cursor: pointer;
      }

      .hero {
        display: block;
        margin-top: 24px;
      }

      .hero-main,
      .panel,
      .task {
        border: 1px solid var(--line);
        background: rgba(255, 253, 249, 0.86);
        box-shadow: var(--shadow-soft);
      }

      .hero-main {
        position: relative;
        overflow: hidden;
        border-radius: 36px;
        padding: clamp(28px, 4vw, 48px);
        background:
          radial-gradient(circle at top right, rgba(0, 117, 74, 0.1), transparent 28%),
          linear-gradient(135deg, rgba(255, 255, 255, 0.72), rgba(245, 241, 233, 0.96));
      }

      .hero-main::after {
        content: "";
        position: absolute;
        right: -72px;
        top: 36px;
        width: 260px;
        height: 260px;
        border-radius: 50%;
        background:
          radial-gradient(circle, rgba(203, 162, 88, 0.26), rgba(203, 162, 88, 0.02) 62%, transparent 66%);
        pointer-events: none;
      }

      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.16em;
        font-size: 0.78rem;
      }

      .hero-copy h1 {
        margin: 16px 0 8px;
        font-size: clamp(2.4rem, 4vw, 4.6rem);
        line-height: 0.96;
        color: var(--brand);
      }

      .hero-grid {
        display: block;
        margin-top: 24px;
      }

      .panel {
        border-radius: var(--radius-lg);
        padding: 22px;
      }

      .section-row {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
      }

      .section-title {
        margin: 0 0 4px;
        color: var(--brand-deep);
        font-size: 1.42rem;
      }

      .path-box {
        margin-top: 18px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: rgba(212, 233, 226, 0.32);
        padding: 18px;
      }

      .path-box code {
        display: block;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 0.94rem;
        color: var(--brand-deep);
        word-break: break-all;
      }

      .button-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 18px;
      }

      .btn {
        appearance: none;
        border: 1px solid transparent;
        border-radius: 999px;
        padding: 12px 18px;
        min-height: 46px;
        cursor: pointer;
        transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      .btn:active {
        transform: scale(0.98);
      }

      .btn-primary {
        background: var(--brand-accent);
        color: #fff;
        box-shadow: 0 14px 28px rgba(0, 117, 74, 0.22);
      }

      .btn-secondary {
        border-color: rgba(0, 117, 74, 0.35);
        background: rgba(255, 255, 255, 0.88);
        color: var(--brand-accent);
      }

      .status-inline {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        margin-top: 18px;
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 0.86rem;
        border: 1px solid var(--line);
      }

      .status-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: currentColor;
      }

      .history-panel {
        position: fixed;
        top: 20px;
        right: 20px;
        width: min(420px, calc(100vw - 24px));
        max-height: calc(100vh - 40px);
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: rgba(255, 253, 249, 0.96);
        box-shadow: var(--shadow-lift);
        padding: 20px;
        z-index: 20;
        transform: translateX(calc(100% + 24px));
        opacity: 0;
        pointer-events: none;
        transition: transform 220ms ease, opacity 220ms ease;
      }

      .history-panel.open {
        transform: translateX(0);
        opacity: 1;
        pointer-events: auto;
      }

      .history-header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
      }

      .history-body {
        margin-top: 18px;
      }

      .history-close {
        width: 36px;
        height: 36px;
        padding: 0;
        border-radius: 50%;
      }

      .task-list {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }

      .task {
        border-radius: 22px;
        padding: 18px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: center;
      }

      .task-title {
        display: block;
        font-size: 1rem;
      }

      .task-tags {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 10px;
      }

      .pill {
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 0.82rem;
        border: 1px solid transparent;
      }

      .pill.ok {
        background: rgba(212, 233, 226, 0.52);
        color: var(--ok);
      }

      .pill.warn {
        background: var(--warn-bg);
        color: var(--warn);
      }

      .pill.danger {
        background: var(--danger-bg);
        color: var(--danger);
      }

      .task-aside {
        min-width: 132px;
        text-align: right;
      }

      .task-aside strong {
        display: block;
        font-size: 1.28rem;
        color: var(--brand-deep);
      }

      @media (max-width: 720px) {
        .shell {
          width: min(calc(100% - 20px), var(--max));
          margin-top: 14px;
        }

        .topbar {
          border-radius: 28px;
          align-items: flex-start;
          flex-direction: column;
        }

        .task {
          grid-template-columns: 1fr;
        }

        .task-aside {
          text-align: left;
        }

        .hero-main,
        .panel {
          border-radius: 24px;
        }

        .history-panel {
          top: 12px;
          right: 12px;
          max-height: calc(100vh - 24px);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation: none !important;
          transition: none !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">扫</div>
          <div class="brand-copy">
            <strong>人员资料填报助手</strong>
            <span>扫描</span>
          </div>
        </div>
        <button class="chip icon-button" type="button" id="history-trigger" aria-label="查看扫描历史">
          <span aria-hidden="true">◷</span>
        </button>
      </header>

      <section class="hero">
        <div class="hero-main">
          <div class="hero-copy">
            <div class="eyebrow">扫描入口</div>
            <h1>扫描资料目录</h1>
          </div>

          <div class="hero-grid">
            <section class="panel">
              <div class="section-row">
                <div>
                  <div class="eyebrow">目录</div>
                  <h2 class="section-title">资料目录</h2>
                </div>
                <span class="chip">最近使用</span>
              </div>
              <div class="path-box">
                <code>/Users/joel/Documents/申报资料/2026春季人才项目</code>
              </div>
              <div class="button-row">
                <button class="btn btn-secondary" type="button">选择目录</button>
                <button class="btn btn-primary" type="button" id="primary-action">开始扫描</button>
              </div>
              <div class="status-inline">
                <span class="status-badge" id="summary-badge">
                  <span class="status-dot"></span>
                  未开始
                </span>
                <span class="helper" id="scan-summary">未开始扫描</span>
              </div>
            </section>
          </div>
        </div>
      </section>
    </main>

    <aside class="history-panel" id="history-panel" aria-hidden="true">
      <div class="history-header">
        <div>
          <div class="eyebrow">扫描历史</div>
          <h2 class="section-title">最近任务</h2>
        </div>
        <button class="btn btn-secondary history-close" type="button" id="history-close" aria-label="关闭">
          ×
        </button>
      </div>

      <div class="history-body">
        <p class="helper" id="recent-summary">未检测到历史任务。</p>
        <div class="task-list" id="task-list">
          <article class="task">
            <div>
              <span class="task-title">等待首次扫描</span>
              <div class="task-meta">暂无记录</div>
              <div class="task-tags">
                <span class="pill warn">需要选择目录</span>
                <span class="pill warn">workspace 待初始化</span>
              </div>
            </div>
            <div class="task-aside">
              <strong>0 / 0</strong>
              <span class="helper">文件 / 人员</span>
            </div>
          </article>
        </div>
      </div>
    </aside>

    <script>
      const states = {
        empty: {
          primaryAction: "开始扫描",
          scanSummary: "未开始扫描",
          recentSummary: "未检测到历史任务。",
          summaryBadge: ["未开始", "warn"],
          tasks: [
            {
              title: "等待首次扫描",
              meta: "暂无记录",
              tags: [
                ["需要选择目录", "warn"],
                ["workspace 待初始化", "warn"],
              ],
              stat: "0 / 0",
              statLabel: "文件 / 人员",
            },
          ],
        },
        running: {
          primaryAction: "扫描中",
          scanSummary: "42 已处理 · 19 跳过 · 2 失败",
          recentSummary: "42 已处理，19 已跳过，2 失败。",
          summaryBadge: ["进行中", "ok"],
          tasks: [
            {
              title: "增量扫描 · 2026-04-21 16:48",
              meta: "扫描中",
              tags: [
                ["进行中", "ok"],
                ["42 已处理", "ok"],
                ["19 已跳过", "warn"],
                ["2 失败", "danger"],
              ],
              stat: "63%",
              statLabel: "总体进度",
            },
            {
              title: "失败文件提示",
              meta: "2 个文件异常",
              tags: [
                ["doc 转换失败", "danger"],
                ["xls 部分可解析", "warn"],
              ],
              stat: "2",
              statLabel: "异常文件",
            },
          ],
        },
        done: {
          primaryAction: "重新扫描",
          scanSummary: "67 文件 · 31 人 · 2 待复核",
          recentSummary: "67 文件，31 人，2 个异常文件待复核。",
          summaryBadge: ["已完成", "ok"],
          tasks: [
            {
              title: "增量扫描 · 已完成",
              meta: "已完成",
              tags: [
                ["已完成", "ok"],
                ["31 人已聚合", "ok"],
                ["2 文件需复核", "warn"],
              ],
              stat: "67 / 31",
              statLabel: "文件 / 人员",
            },
            {
              title: "下一步",
              meta: "进入人员列表",
              tags: [
                ["进入人员列表", "ok"],
                ["8 人有冲突", "danger"],
              ],
              stat: "8",
              statLabel: "高风险对象",
            },
          ],
        },
      };

      const historyTrigger = document.getElementById("history-trigger");
      const historyClose = document.getElementById("history-close");
      const historyPanel = document.getElementById("history-panel");
      const primaryAction = document.getElementById("primary-action");
      const summaryBadge = document.getElementById("summary-badge");
      const scanSummary = document.getElementById("scan-summary");
      const recentSummary = document.getElementById("recent-summary");
      const taskList = document.getElementById("task-list");

      function renderTasks(tasks) {
        taskList.innerHTML = tasks
          .map(
            (task) => `
              <article class="task">
                <div>
                  <span class="task-title">${task.title}</span>
                  <div class="task-meta">${task.meta}</div>
                  <div class="task-tags">
                    ${task.tags
                      .map(([label, kind]) => `<span class="pill ${kind}">${label}</span>`)
                      .join("")}
                  </div>
                </div>
                <div class="task-aside">
                  <strong>${task.stat}</strong>
                  <span class="helper">${task.statLabel}</span>
                </div>
              </article>
            `,
          )
          .join("");
      }

      function applyBadge([label, kind]) {
        summaryBadge.innerHTML = `<span class="status-dot"></span>${label}`;
        summaryBadge.style.color =
          kind === "danger" ? "var(--danger)" : kind === "warn" ? "var(--warn)" : "var(--ok)";
        summaryBadge.style.background =
          kind === "danger"
            ? "var(--danger-bg)"
            : kind === "warn"
              ? "var(--warn-bg)"
              : "rgba(212, 233, 226, 0.52)";
      }

      function renderState(key) {
        const state = states[key];
        primaryAction.textContent = state.primaryAction;
        scanSummary.textContent = state.scanSummary;
        recentSummary.textContent = state.recentSummary;
        applyBadge(state.summaryBadge);
        renderTasks(state.tasks);
      }

      historyTrigger.addEventListener("click", () => {
        historyPanel.classList.add("open");
        historyPanel.setAttribute("aria-hidden", "false");
      });

      historyClose.addEventListener("click", () => {
        historyPanel.classList.remove("open");
        historyPanel.setAttribute("aria-hidden", "true");
      });

      renderState("empty");
    </script>
  </body>
</html>
